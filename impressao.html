<style>
                  @page { margin: 0; size: 58mm auto; }
                  body { 
                      font-family: Arial, Helvetica, sans-serif; 
                      width: 44mm;
                      text-align: left;
                      padding: 0.5;
                      margin: 0;
                      color: #000;
                      font-size: 9px; 
                  }
                  h3 { margin: 0; text-align: center; font-size: 12px; }
                  .centro { text-align: center; }
                  .linha { border-top: 1px dashed #000; margin: 6px 0; }
                  .linha-solida { border-top: 1px solid #000; margin: 6px 0; }
                  .bold { font-weight: bold; }
                  .direita { text-align: right; font-size: 9px; }
                  p { margin: 2px 0; }
                  .resumo-itens {
                      white-space: pre-wrap; 
                      font-size: 9px; 
                      word-break: break-word;
                      line-height: 1.4;
                  }
              </style>
              <h3>BIA OLIVEIRA</h3>
              <h3>ATELIER GOURMET</h3>
              <p class="centro" style="font-size: 9px; margin-bottom: 2px;">WhatsApp: ${lojaTel}</p>
              <p class="centro bold" style="font-size: 11px;">PEDIDO #${p.id}</p>
              <p class="centro" style="font-size: 8px;">${dataFormatada}</p>
              
              <div class="linha-solida"></div>
              
              <p><span class="bold">Cliente:</span> ${nomeSeguro}</p>
              <p><span class="bold">WhatsApp:</span> ${zapSeguro}</p>
              <p><span class="bold">End.:</span> ${enderecoSeguro}</p>
              
              <div class="linha-solida"></div>
              
              <div class="resumo-itens">${itensSeguros.trim()}</div>
              
              <div class="linha-solida"></div>
              
              <p class="direita"><span class="bold">Pgto:</span> ${formaPagamento}</p>
              <p class="direita bold" style="font-size: 11px; margin-top: 4px;">TOTAL: R$ ${totalSeguro.toFixed(2).replace('.', ',')}</p>
              
              <br><br><br>

<script>
  window.onload = function () {
    const dadosTeste = {
      lojaTel: '(11) 99999-9999',
      p: { id: 12345 },
      nomeSeguro: 'João Silva',
      zapSeguro: '(11) 98888-8888',
      enderecoSeguro: 'Rua das Flores, 123 - SP',
      itensSeguros: `1x Bolo de Chocolate - R$ 45,00
2x Brigadeiro Gourmet
1x Torta de Morango
3x Cookies`,
      totalSeguro: 120.50
    };

    document.body.innerHTML = document.body.innerHTML
      .replace(/\$\{lojaTel\}/g, dadosTeste.lojaTel)
      .replace(/\$\{p\.id\}/g, dadosTeste.p.id)
      .replace(/\$\{nomeSeguro\}/g, dadosTeste.nomeSeguro)
      .replace(/\$\{zapSeguro\}/g, dadosTeste.zapSeguro)
      .replace(/\$\{enderecoSeguro\}/g, dadosTeste.enderecoSeguro)
      .replace(/\$\{itensSeguros\.trim\(\)\}/g, dadosTeste.itensSeguros.trim())
      .replace(/\$\{totalSeguro\.toFixed\(2\)\.replace\('\.', ','\)\}/g, dadosTeste.totalSeguro.toFixed(2).replace('.', ','));
  }
</script>
