<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <script>
      const usuarioSession = JSON.parse(localStorage.getItem('atelierUsuario'))
      if (!usuarioSession || usuarioSession.role !== 'ADMIN') {
        window.location.href = '../index.html'
      }
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerenciar Cardápio</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      body {
        font-family: 'Segoe UI', sans-serif;
        padding: 20px;
        color: #333;
        background: #f4f4f4;
        margin: 0;
      }

      .top-nav {
        margin-bottom: 20px;
      }
      .btn-voltar {
        background: #5d4037;
        color: white;
        text-decoration: none;
        padding: 10px 15px;
        border-radius: 8px;
        font-weight: bold;
        font-size: 0.9em;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: 0.2s;
      }
      .btn-voltar:hover {
        background: #4a332c;
      }

      .form-container {
        background: white;
        padding: 20px;
        border-radius: 10px;
        border-top: 4px solid #ff85a1;
        margin-bottom: 30px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      }
      .form-group {
        margin-bottom: 15px;
      }
      input,
      textarea,
      select {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        box-sizing: border-box;
        font-family: inherit;
      }
      button {
        background: #ff85a1;
        color: white;
        border: none;
        padding: 12px 25px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.2s;
        font-size: 1em;
      }
      button:hover {
        background: #ff6b8d;
        transform: translateY(-2px);
      }

      .botoes-form {
        display: flex;
        gap: 10px;
        margin-top: 15px;
        flex-wrap: wrap;
      }
      .btn-cancelar {
        background: #95a5a6;
      }
      .btn-cancelar:hover {
        background: #7f8c8d;
      }

      /* Tabela Responsiva */
      .table-responsive {
        width: 100%;
        overflow-x: auto;
        background: white;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      }
      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 600px;
      }
      th,
      td {
        padding: 15px;
        border-bottom: 1px solid #eee;
        text-align: left;
      }
      th {
        background-color: #2c3e50;
        color: white;
        font-weight: bold;
      }

      .btn-tabela {
        color: white;
        border: none;
        padding: 8px 12px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.85em;
        font-weight: bold;
        margin: 2px;
        transition: 0.2s;
        display: inline-flex;
        align-items: center;
        gap: 5px;
      }
      .btn-excluir {
        background: #e74c3c;
      }
      .btn-excluir:hover {
        background: #c0392b;
      }
      .btn-editar {
        background: #3498db;
      }
      .btn-editar:hover {
        background: #2980b9;
      }
      .btn-pausar {
        background: #f39c12;
      }
      .btn-pausar:hover {
        background: #d68910;
      }
      .btn-ativar {
        background: #27ae60;
      }
      .btn-ativar:hover {
        background: #219653;
      }

      .badge-pausado {
        background: #e74c3c;
        color: white;
        font-size: 0.75em;
        padding: 3px 8px;
        border-radius: 12px;
        margin-left: 8px;
        font-weight: bold;
      }

      .aviso-foto {
        font-size: 0.85em;
        color: #e67e22;
        font-weight: bold;
        margin-top: 5px;
        display: none;
      }
      .contador-caracteres {
        font-size: 0.8em;
        color: #888;
        display: block;
        text-align: right;
        margin-top: 5px;
        font-weight: bold;
      }
      .grupo-opcao-box {
        background: #f9f9f9;
        border: 1px solid #ddd;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 15px;
        border-left: 4px solid #3498db;
      }
      .btn-pequeno {
        padding: 8px 12px;
        font-size: 0.85em;
        border-radius: 6px;
      }

      @media (max-width: 600px) {
        .botoes-form button {
          flex: 1;
          width: 100%;
        }
        .acoes-celula {
          display: flex;
          flex-direction: column;
          gap: 5px;
        }
        .btn-tabela {
          width: 100%;
          justify-content: center;
        }
      }
    </style>
  </head>
  <body>
    <div class="top-nav">
      <a href="t328cn74yt4302fty438n.html" class="btn-voltar"
        ><i class="fa-solid fa-arrow-left"></i> Voltar ao Painel</a
      >
    </div>

    <h2 style="color: #5d4037; margin-top: 0">🍰 Novo Produto no Cardápio</h2>

    <div class="form-container">
      <div class="form-group">
        <input
          type="text"
          id="nome"
          placeholder="Nome do Doce (Ex: Bolo Bentô)"
        />
      </div>
      <div style="display: flex; gap: 10px; flex-wrap: wrap" class="form-group">
        <input
          type="number"
          id="preco"
          placeholder="Preço Base (Ex: 35.00 ou 0 para A partir de)"
          step="0.01"
          style="flex: 1; min-width: 120px"
        />
        <select id="categoria" style="flex: 2; min-width: 150px">
          <option value="">Carregando categorias...</option>
        </select>
      </div>
      <div class="form-group">
        <label
          style="
            font-weight: bold;
            color: #555;
            display: block;
            margin-bottom: 5px;
          "
          >Foto:</label
        >
        <input
          type="file"
          id="arquivoImagem"
          accept="image/*"
          style="background: white"
        />
        <div id="avisoFoto" class="aviso-foto">
          <i class="fa-solid fa-circle-info"></i> A foto atual será mantida.
          Escolha um arquivo apenas se quiser trocar.
        </div>
      </div>

      <div class="form-group">
        <textarea
          id="descricao"
          placeholder="Descrição curta (Máximo de 255 caracteres)"
          maxlength="255"
          oninput="atualizarContador()"
          rows="3"
        ></textarea>
        <span id="contadorDescricao" class="contador-caracteres">0/255</span>
      </div>

      <div
        class="form-group"
        style="border-top: 2px dashed #ddd; padding-top: 20px; margin-top: 20px"
      >
        <label
          style="
            color: #3498db;
            font-size: 1.1em;
            font-weight: bold;
            display: block;
          "
          >✨ Complementos e Variações (Opcional)</label
        >
        <p style="font-size: 0.85em; color: #666; margin-top: 5px">
          Crie opções como "Sabor do Bolo", "Acompanhamentos Extras", etc.
        </p>
        <div id="containerOpcoes"></div>
        <button
          type="button"
          style="
            background: #27ae60;
            padding: 10px 15px;
            font-size: 0.9em;
            margin-top: 10px;
          "
          onclick="adicionarGrupoOpcao()"
        >
          <i class="fa-solid fa-plus"></i> Adicionar Grupo
        </button>
      </div>

      <div class="botoes-form">
        <button
          id="btnSalvarProduto"
          onclick="cadastrarProduto()"
          style="flex: 2; font-size: 1.1em"
        >
          <i class="fa-solid fa-check"></i> Salvar no Cardápio
        </button>
        <button
          id="btnCancelarEdicao"
          onclick="cancelarEdicao()"
          class="btn-cancelar"
          style="flex: 1; font-size: 1.1em; display: none"
        >
          <i class="fa-solid fa-xmark"></i> Cancelar Edição
        </button>
      </div>
    </div>

    <h2 style="color: #5d4037">📋 Itens Ativos</h2>

    <div class="table-responsive">
      <table id="tabela-produtos">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Preço Base</th>
            <th>Categoria</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <input type="hidden" id="produtoId" />
    <input type="hidden" id="linkImagemAtual" />

    <script>
      const BASE_URL = `https://ateliergourmet.duckdns.org`
      const API_URL = `${BASE_URL}/produtos`
      const CAT_URL = `${BASE_URL}/categorias`

      let listaProdutosLocal = []
      let gruposOpcionais = []

      function atualizarContador() {
        const campo = document.getElementById('descricao')
        const contador = document.getElementById('contadorDescricao')
        const tamanho = campo.value.length
        contador.innerText = `${tamanho}/255`
        contador.style.color = tamanho >= 255 ? 'red' : '#888'
      }

      async function alternarDisponibilidade(id) {
        const uLogado = JSON.parse(localStorage.getItem('atelierUsuario'))
        try {
          const res = await fetch(`${API_URL}/${id}/disponibilidade`, {
            method: 'PATCH',
            headers: { Authorization: `Bearer ${uLogado.token}` }
          })
          if (res.ok) {
            carregarTabela()
          } else {
            alert('Erro ao mudar disponibilidade.')
          }
        } catch (e) {
          alert('Erro de conexão com o servidor.')
        }
      }

      function renderizarOpcoes() {
        const container = document.getElementById('containerOpcoes')
        container.innerHTML = ''
        gruposOpcionais.forEach((grupo, gIndex) => {
          let htmlItens = ''
          grupo.itens.forEach((item, iIndex) => {
            let isPausado = item.pausado === true;
            let bgItem = isPausado ? "background-color: #f8d7da; opacity: 0.8;" : "";
            let textRisk = isPausado ? "text-decoration: line-through; color: #721c24;" : "";
            
            let btnPausa = isPausado
                ? `<button type="button" onclick="togglePausaItem(${gIndex}, ${iIndex})" class="btn-tabela btn-ativar" style="margin:0; padding: 8px 12px;" title="Ativar Item"><i class="fa-solid fa-play"></i></button>`
                : `<button type="button" onclick="togglePausaItem(${gIndex}, ${iIndex})" class="btn-tabela btn-pausar" style="margin:0; padding: 8px 12px;" title="Pausar Item"><i class="fa-solid fa-pause"></i></button>`;

            htmlItens += `
                      <div style="display: flex; gap: 10px; margin-top: 8px; align-items: center; flex-wrap: wrap; padding: 5px; border-radius: 5px; ${bgItem}">
                          <input type="text" placeholder="Nome do Item" value="${item.nome}" onchange="atualizarItem(${gIndex}, ${iIndex}, 'nome', this.value)" style="flex: 2; padding: 8px; min-width: 100px; ${textRisk}">
                          <input type="number" placeholder="R$ Extra" value="${item.preco}" step="0.01" onchange="atualizarItem(${gIndex}, ${iIndex}, 'preco', this.value)" style="flex: 1; padding: 8px; min-width: 80px; ${textRisk}">
                          ${btnPausa}
                          <button type="button" onclick="removerItem(${gIndex}, ${iIndex})" class="btn-tabela btn-excluir" style="margin:0; padding: 8px 12px;" title="Excluir Item"><i class="fa-solid fa-xmark"></i></button>
                      </div>`
          })

          container.innerHTML += `
              <div class="grupo-opcao-box">
                  <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                      <input type="text" placeholder="Título (Ex: Escolha o Sabor)" value="${
                        grupo.titulo
                      }" onchange="atualizarGrupo(${gIndex}, 'titulo', this.value)" style="flex: 1; font-weight: bold; border-color: #3498db; padding: 10px; min-width: 150px;">
                      <button type="button" onclick="removerGrupo(${gIndex})" class="btn-tabela btn-excluir" style="margin:0;"><i class="fa-solid fa-trash"></i> Grupo</button>
                  </div>
                  <div style="margin-top: 15px; display: flex; gap: 15px; font-size: 0.9em; color: #555; flex-wrap: wrap; align-items: center;">
                      <label style="margin:0; cursor: pointer; display: flex; align-items: center; gap: 5px;"><input type="checkbox" ${
                        grupo.obrigatorio ? 'checked' : ''
                      } onchange="atualizarGrupo(${gIndex}, 'obrigatorio', this.checked)"> Obrigatório</label>
                      <label style="margin:0; display: flex; align-items: center; gap: 5px;">Tipo: 
                          <select onchange="atualizarGrupo(${gIndex}, 'tipo', this.value)" style="padding: 6px; border-radius: 4px; border: 1px solid #ccc; width: auto;">
                              <option value="simples" ${
                                grupo.tipo === 'simples' ? 'selected' : ''
                              }>Apenas 1 opção</option>
                              <option value="multipla" ${
                                grupo.tipo === 'multipla' ? 'selected' : ''
                              }>Várias opções</option>
                              <option value="quantidade" ${
                                grupo.tipo === 'quantidade' ? 'selected' : ''
                              }>Quantidade (+ e -)</option>
                          </select>
                      </label>
                  </div>
                  <div style="margin-top: 15px; border-top: 1px dashed #ccc; padding-top: 10px;">
                      ${htmlItens}
                      <button type="button" class="btn-pequeno" style="background: #3498db; color: white; border: none; margin-top: 10px; cursor: pointer;" onclick="adicionarItemAoGrupo(${gIndex})"><i class="fa-solid fa-plus"></i> Item</button>
                  </div>
              </div>`
        })
      }

      function adicionarGrupoOpcao() {
        gruposOpcionais.push({
          titulo: '',
          obrigatorio: false,
          tipo: 'simples',
          itens: []
        })
        renderizarOpcoes()
      }
      function removerGrupo(gIndex) {
        gruposOpcionais.splice(gIndex, 1)
        renderizarOpcoes()
      }
      function atualizarGrupo(gIndex, campo, valor) {
        gruposOpcionais[gIndex][campo] = valor
      }
      
      function adicionarItemAoGrupo(gIndex) {
        gruposOpcionais[gIndex].itens.push({ nome: '', preco: 0, pausado: false })
        renderizarOpcoes()
      }

      function togglePausaItem(gIndex, iIndex) {
        if (gruposOpcionais[gIndex].itens[iIndex].pausado) {
            gruposOpcionais[gIndex].itens[iIndex].pausado = false;
        } else {
            gruposOpcionais[gIndex].itens[iIndex].pausado = true;
        }
        renderizarOpcoes();
      }

      function removerItem(gIndex, iIndex) {
        gruposOpcionais[gIndex].itens.splice(iIndex, 1)
        renderizarOpcoes()
      }
      function atualizarItem(gIndex, iIndex, campo, valor) {
        gruposOpcionais[gIndex].itens[iIndex][campo] =
          campo === 'preco' ? parseFloat(valor || 0) : valor
      }

      async function carregarCategorias() {
        try {
          const res = await fetch(CAT_URL)
          const categorias = await res.json()
          const select = document.getElementById('categoria')
          select.innerHTML =
            '<option value="">Selecione uma categoria...</option>'
          categorias.forEach(c => {
            select.innerHTML += `<option value="${c.nome}">${c.nome}</option>`
          })
        } catch (error) {
          document.getElementById('categoria').innerHTML =
            '<option value="">Erro ao carregar</option>'
        }
      }

      async function carregarTabela() {
        try {
          const res = await fetch(API_URL)
          listaProdutosLocal = await res.json()
          const tbody = document.querySelector('#tabela-produtos tbody')
          tbody.innerHTML = ''
          listaProdutosLocal.forEach(p => {
            const idArg = JSON.stringify(p.id)
            let isDisponivel = p.disponivel !== false
            const precoBase = Number(p.valorUnitario) || 0

            let corLinha = isDisponivel
              ? ''
              : 'background-color: #fcfcfc; color: #888;'
            let classeBotaoDisp = isDisponivel ? 'btn-pausar' : 'btn-ativar'
            let textoBotaoDisp = isDisponivel
              ? '<i class="fa-solid fa-pause"></i> Pausar'
              : '<i class="fa-solid fa-play"></i> Ativar'
            let badgeDisp = isDisponivel
              ? ''
              : "<span class='badge-pausado'>Pausado</span>"

            tbody.innerHTML += `
                    <tr style="${corLinha}">
                        <td>${p.id}</td>
                        <td><b>${p.nome}</b>${badgeDisp}</td>
                        <td>R$ ${precoBase.toFixed(2).replace('.', ',')}</td>
                        <td>${p.categoria}</td>
                        <td class="acoes-celula">
                            <button class="btn-tabela ${classeBotaoDisp}" onclick="alternarDisponibilidade(${idArg})">${textoBotaoDisp}</button>
                            <button class="btn-tabela btn-editar" onclick="prepararEdicao(${idArg})"><i class="fa-solid fa-pen"></i> Editar</button>
                            <button class="btn-tabela btn-excluir" onclick="excluirProduto(${idArg})"><i class="fa-solid fa-trash"></i></button>
                        </td>
                    </tr>`
          })
        } catch (error) {
          console.error('Erro ao carregar tabela:', error)
        }
      }

      async function excluirProduto(id) {
        if (confirm('Deseja realmente remover este doce do cardápio?')) {
          const uLogado = JSON.parse(localStorage.getItem('atelierUsuario'))
          try {
            await fetch(`${API_URL}/${id}`, {
              method: 'DELETE',
              headers: { Authorization: `Bearer ${uLogado.token}` }
            })
            carregarTabela()
          } catch (error) {
            alert('Erro ao excluir produto: ' + error.message)
          }
        }
      }

      function cancelarEdicao() {
        document.getElementById('produtoId').value = ''
        document.getElementById('nome').value = ''
        document.getElementById('preco').value = ''
        document.getElementById('categoria').value = ''
        document.getElementById('descricao').value = ''
        atualizarContador()
        document.getElementById('linkImagemAtual').value = ''
        document.getElementById('arquivoImagem').value = ''
        document.getElementById('avisoFoto').style.display = 'none'

        document.getElementById('btnSalvarProduto').innerHTML =
          '<i class="fa-solid fa-check"></i> Salvar no Cardápio'
        document.getElementById('btnCancelarEdicao').style.display = 'none'
        gruposOpcionais = []
        renderizarOpcoes()
      }

      async function cadastrarProduto() {
        const id = document.getElementById('produtoId').value
        const fileInput = document.getElementById('arquivoImagem')
        const linkImagemAtual = document.getElementById('linkImagemAtual').value
        const produto = {
          nome: document.getElementById('nome').value,
          valorUnitario: parseFloat(document.getElementById('preco').value),
          categoria: document.getElementById('categoria').value,
          descricao: document.getElementById('descricao').value,
          linkImagem: linkImagemAtual,
          opcionais: JSON.stringify(gruposOpcionais)
        }

        if (!produto.nome || isNaN(produto.valorUnitario) || produto.valorUnitario < 0 || !produto.categoria) {
          alert('Preencha o nome, um preço válido (pode ser 0) e a categoria!')
          return
        }

        const formData = new FormData()
        formData.append(
          'produto',
          new Blob([JSON.stringify(produto)], { type: 'application/json' })
        )
        if (fileInput.files[0]) {
          formData.append('imagem', fileInput.files[0])
        }

        const metodo = id ? 'PUT' : 'POST'
        const urlFinal = id ? `${API_URL}/${id}` : API_URL
        const uLogado = JSON.parse(localStorage.getItem('atelierUsuario'))

        const btnSalvar = document.getElementById('btnSalvarProduto')
        const textoOriginalBtn = btnSalvar.innerHTML
        btnSalvar.disabled = true
        btnSalvar.innerHTML =
          '<i class="fa-solid fa-spinner fa-spin"></i> Salvando...'

        try {
          const res = await fetch(urlFinal, {
            method: metodo,
            headers: { Authorization: `Bearer ${uLogado.token}` },
            body: formData
          })
          if (!res.ok) throw new Error('Falha no servidor')
          cancelarEdicao()
          carregarTabela()
        } catch (e) {
          alert('Erro ao salvar produto!')
        } finally {
          btnSalvar.disabled = false
          if (!id) btnSalvar.innerHTML = textoOriginalBtn
        }
      }

      function prepararEdicao(id) {
        const p = listaProdutosLocal.find(
          prod => String(prod.id) === String(id)
        )
        if (!p) return alert('Produto nao encontrado para edicao.')

        document.getElementById('produtoId').value = p.id
        document.getElementById('nome').value = p.nome
        document.getElementById('preco').value = p.valorUnitario
        document.getElementById('categoria').value = p.categoria
        document.getElementById('descricao').value = p.descricao || ''
        atualizarContador()

        document.getElementById('linkImagemAtual').value = p.linkImagem || ''
        document.getElementById('avisoFoto').style.display = 'block'

        document.getElementById('btnSalvarProduto').innerHTML =
          '<i class="fa-solid fa-pen-to-square"></i> Atualizar Produto'
        document.getElementById('btnCancelarEdicao').style.display = 'block'

        try {
          gruposOpcionais = p.opcionais ? JSON.parse(p.opcionais) : []
        } catch (e) {
          gruposOpcionais = []
        }
        renderizarOpcoes()
        window.scrollTo(0, 0)
      }

      carregarCategorias()
      carregarTabela()
      renderizarOpcoes()
    </script>
  </body>
</html>
