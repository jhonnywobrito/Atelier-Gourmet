<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <script>
      const usuarioLogado = JSON.parse(localStorage.getItem('atelierUsuario'))
      if (!usuarioLogado || usuarioLogado.role !== 'ADMIN') {
        alert('Acesso negado! Área restrita.')
        window.location.href = '../index.html'
      }
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel Admin - Atelier</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <style>
      :root {
        --marrom: #5d4037;
        --rosa: #ff85a1;
        --fundo: #f4f4f4;
      }

      body {
        font-family: 'Nunito', sans-serif;
        background-color: var(--fundo);
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* HEADER */
      .admin-header {
        background: var(--marrom);
        color: white;
        width: 100%;
        padding: 20px;
        text-align: center;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        box-sizing: border-box;
      }
      .admin-header h1 {
        margin: 0;
        font-size: 1.8em;
        color: var(--rosa);
        font-weight: 800;
      }
      .admin-header p {
        margin: 5px 0 0 0;
        font-size: 0.9em;
        color: #ddd;
      }

      /* MODO MANUTENÇÃO ALERT */
      .manutencao-container {
        background: white;
        width: 90%;
        max-width: 800px;
        margin-top: 20px;
        padding: 20px;
        border-radius: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        border-left: 5px solid #e74c3c;
      }
      .manutencao-info h3 { margin: 0; color: var(--marrom); }
      .manutencao-info p { margin: 5px 0 0 0; color: #666; font-size: 0.9em; }
      
      .btn-toggle-manutencao {
        background: #e74c3c;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
        font-size: 1em;
      }
      .btn-toggle-manutencao.ativo { background: #27ae60; }

      /* GRID DE BOTÕES */
      .dashboard-container {
        width: 100%;
        max-width: 800px;
        padding: 20px;
        box-sizing: border-box;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 15px;
      }

      .btn-dash {
        background: white;
        border-radius: 15px;
        padding: 25px 15px;
        text-align: center;
        text-decoration: none;
        color: var(--marrom);
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        transition: transform 0.2s, box-shadow 0.2s;
        border: 2px solid transparent;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
      
      .btn-dash:hover, .btn-dash:active {
        transform: translateY(-5px);
        box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        border-color: var(--rosa);
      }

      .btn-dash i {
        font-size: 2.5em;
        color: var(--rosa);
        margin-bottom: 5px;
      }

      .btn-dash span {
        font-weight: 800;
        font-size: 1.1em;
      }

      .btn-voltar {
        background: var(--marrom);
        color: white;
        text-decoration: none;
        padding: 15px 30px;
        border-radius: 30px;
        font-weight: bold;
        margin-top: 10px;
        margin-bottom: 40px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      }

      @media (min-width: 768px) {
        .dashboard-container {
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 20px;
        }
        .btn-dash { padding: 35px 20px; }
      }
    </style>
  </head>
  <body>
    
    <div class="admin-header">
      <h1>Painel de Controle</h1>
      <p>Gerencie sua loja e pedidos</p>
    </div>

    <div class="manutencao-container">
      <div class="manutencao-info">
        <h3>Modo Manutenção</h3>
        <p id="txtManutencao">A loja está aberta para os clientes.</p>
      </div>
      <button id="btnManutencao" class="btn-toggle-manutencao" onclick="toggleManutencao()">
        Carregando...
      </button>
    </div>

    <div class="dashboard-container">
      
      <a href="pedidos.html" class="btn-dash">
        <i class="fa-solid fa-motorcycle"></i>
        <span>Pedidos</span>
      </a>

      <a href="gerenciar-cardapio.html" class="btn-dash">
        <i class="fa-solid fa-cake-candles"></i>
        <span>Cardápio</span>
      </a>

      <a href="gerenciar-categorias.html" class="btn-dash">
        <i class="fa-solid fa-tags"></i>
        <span>Categorias</span>
      </a>

      <a href="clientes.html" class="btn-dash">
        <i class="fa-solid fa-users"></i>
        <span>Clientes</span>
      </a>

      <a href="pagamentos.html" class="btn-dash">
        <i class="fa-solid fa-credit-card"></i>
        <span>Formas de Pagto</span>
      </a>

      <a href="configuracoes.html" class="btn-dash">
        <i class="fa-solid fa-store"></i>
        <span>Configurações</span>
      </a>

    </div>

    <a href="../index.html" class="btn-voltar"><i class="fa-solid fa-arrow-left"></i> Voltar para a Loja</a>

    <script>
      const BASE_URL = 'https://ateliergourmet.duckdns.org';
      let isManutencao = false;

      async function carregarStatus() {
        try {
          const res = await fetch(`${BASE_URL}/usuarios/loja`);
          const loja = await res.json();
          isManutencao = loja.manutencao === true;
          atualizarVisualBotao();
        } catch (e) {
          console.error("Erro ao carregar configurações.");
        }
      }

      function atualizarVisualBotao() {
        const btn = document.getElementById('btnManutencao');
        const txt = document.getElementById('txtManutencao');
        
        if (isManutencao) {
          btn.innerText = "Reabrir Loja";
          btn.className = "btn-toggle-manutencao ativo";
          txt.innerText = "A loja está FECHADA. Clientes veem tela de manutenção.";
        } else {
          btn.innerText = "Ativar Manutenção";
          btn.className = "btn-toggle-manutencao";
          txt.innerText = "A loja está ABERTA e funcionando normalmente.";
        }
      }

      async function toggleManutencao() {
        const u = JSON.parse(localStorage.getItem('atelierUsuario'));
        const btn = document.getElementById('btnManutencao');
        btn.innerText = "Aguarde...";

        isManutencao = !isManutencao;

        try {
          await fetch(`${BASE_URL}/usuarios/${u.id}/pagamentos`, {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${u.token}` },
              body: JSON.stringify({ manutencao: isManutencao })
          });
          atualizarVisualBotao();
        } catch (e) {
          alert("Erro de conexão.");
          isManutencao = !isManutencao;
          atualizarVisualBotao();
        }
      }

      carregarStatus();
    </script>
  </body>
</html>
